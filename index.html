<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente Virtual · Iberdrola × Carrefour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <!-- Cabecera de marca -->
    <header class="brand-bar">
      <div class="brand-left">
        <!-- Logo Iberdrola (SVG inline) -->
        <svg class="logo-iberdrola" viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg" aria-label="Iberdrola">
          <g transform="translate(0,5)">
            <circle cx="25" cy="25" r="24" fill="#80be27"/>
            <path d="M25 8 C16 8, 10 14, 10 22 C10 30, 17 36, 25 42 C33 36, 40 30, 40 22 C40 14, 34 8, 25 8 Z M25 15 L25 35 M18 22 L32 22"
              stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
          </g>
          <text x="60" y="40" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#1a2a18" letter-spacing="-0.5">iberdrola</text>
        </svg>

        <span class="brand-x">×</span>

        <!-- Logo Carrefour (SVG inline) -->
        <svg class="logo-carrefour" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg" aria-label="Carrefour">
          <g transform="translate(5,5)">
            <polygon points="25,0 50,25 38,25 25,12 12,25 0,25" fill="#004e9f"/>
            <polygon points="25,50 0,25 12,25 25,38 38,25 50,25" fill="#e3061a"/>
          </g>
          <text x="65" y="40" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#004e9f" letter-spacing="-0.5">Carrefour</text>
        </svg>
      </div>
      <div class="brand-right">
        <span class="badge">DEMO</span>
      </div>
    </header>

    <!-- Contenedor del chatbot -->
    <main class="chat-wrapper">
      <div class="chat" id="chat">

        <!-- Cabecera del chat -->
        <div class="chat-header">
          <div class="avatar">
            <!-- Mini-logo Iberdrola para avatar -->
            <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" aria-label="Iberdrola">
              <circle cx="25" cy="25" r="24" fill="#80be27"/>
              <path d="M25 8 C16 8, 10 14, 10 22 C10 30, 17 36, 25 42 C33 36, 40 30, 40 22 C40 14, 34 8, 25 8 Z M25 15 L25 35 M18 22 L32 22"
                stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
          <div class="chat-header-info">
            <h2>Asistente Virtual</h2>
          </div>
        </div>

        <!-- Mensajes -->
        <div class="messages" id="messages">
          <!-- Aquí se inyectan los mensajes -->
        </div>

        <!-- Accesos rápidos -->
        <div class="shortcuts" id="shortcuts">
          <button class="shortcut" data-key="colaboracion">¿De qué trata esta colaboración?</button>
          <button class="shortcut" data-key="socio">¿Cómo me hago socio del Club Carrefour?</button>
          <button class="shortcut" data-key="vincular">¿Cómo vinculo Iberdrola con el Club?</button>
        </div>

        <!-- Caja de entrada -->
        <form class="input-bar" id="input-bar" autocomplete="off">
          <input
            type="text"
            id="user-input"
            placeholder="Escribe tu pregunta…"
            aria-label="Escribe tu pregunta"
          />
          <button type="submit" id="send-btn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
