<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Asistente Virtual · Iberdrola × Carrefour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <!-- Cabecera de marca -->
    <header class="brand-bar">
      <div class="brand-left">
        <img src="iberdrolaa.png" alt="Iberdrola × Carrefour" class="logo-combo" />
      </div>
    </header>

    <!-- ============ PANTALLA 1: BIENVENIDA ============ -->
    <section class="welcome-screen" id="welcome-screen">
      <div class="welcome-content">

        <!-- Avatar humano corporativo (SVG) -->
        <div class="avatar-hero">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="Asistente Virtual">
            <!-- Fondo circular con anillo -->
            <circle cx="100" cy="100" r="95" fill="#eaf5d8"/>
            <circle cx="100" cy="100" r="95" fill="none" stroke="#80be27" stroke-width="3" stroke-dasharray="4 6" class="ring-rotate"/>

            <!-- Cuello / hombros -->
            <path d="M 50 200 Q 50 155 100 150 Q 150 155 150 200 Z" fill="#4a8b1a"/>
            <path d="M 60 200 Q 65 165 100 162 Q 135 165 140 200 Z" fill="#80be27"/>

            <!-- Cara -->
            <ellipse cx="100" cy="100" rx="42" ry="48" fill="#f4d4b8"/>

            <!-- Pelo (corte profesional) -->
            <path d="M 58 95 Q 55 60 100 55 Q 145 60 142 95 Q 142 80 130 75 Q 115 78 100 76 Q 85 78 70 75 Q 58 80 58 95 Z" fill="#3d2817"/>

            <!-- Cejas -->
            <path d="M 78 90 Q 85 87 92 90" stroke="#3d2817" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M 108 90 Q 115 87 122 90" stroke="#3d2817" stroke-width="2.5" stroke-linecap="round" fill="none"/>

            <!-- Ojos -->
            <ellipse cx="85" cy="100" rx="3" ry="4" fill="#3d2817"/>
            <ellipse cx="115" cy="100" rx="3" ry="4" fill="#3d2817"/>
            <circle cx="86" cy="99" r="1" fill="white"/>
            <circle cx="116" cy="99" r="1" fill="white"/>

            <!-- Nariz -->
            <path d="M 100 108 Q 98 118 96 122 Q 100 124 104 122 Q 102 118 100 108" fill="#e8c3a3"/>

            <!-- Boca sonriente -->
            <path d="M 90 132 Q 100 138 110 132" stroke="#a0522d" stroke-width="2" stroke-linecap="round" fill="none"/>

            <!-- Auriculares (toque tecnológico/asistente) -->
            <path d="M 55 100 Q 55 75 80 70" stroke="#1a2a18" stroke-width="3" stroke-linecap="round" fill="none"/>
            <rect x="48" y="95" width="12" height="18" rx="4" fill="#1a2a18"/>

            <!-- Micrófono -->
            <path d="M 55 100 Q 35 110 30 130" stroke="#1a2a18" stroke-width="2" fill="none"/>
            <circle cx="30" cy="132" r="4" fill="#80be27"/>
          </svg>
          <div class="status-pulse"></div>
        </div>

        <h1 class="welcome-title">¡Hola! Soy tu asistente</h1>
        <p class="welcome-subtitle">¿En qué te puedo ayudar hoy?</p>

        <div class="welcome-buttons">
          <button class="welcome-btn" data-intent="que_es">
            <span class="welcome-btn-icon">💚</span>
            <span class="welcome-btn-content">
              <span class="welcome-btn-title">¿Qué es?</span>
              <span class="welcome-btn-desc">Conoce la alianza Iberdrola × Carrefour</span>
            </span>
            <span class="welcome-btn-arrow">→</span>
          </button>

          <button class="welcome-btn" data-intent="contratar">
            <span class="welcome-btn-icon">⚡</span>
            <span class="welcome-btn-content">
              <span class="welcome-btn-title">Quiero contratar</span>
              <span class="welcome-btn-desc">Empieza a ahorrar con tu energía</span>
            </span>
            <span class="welcome-btn-arrow">→</span>
          </button>

          <button class="welcome-btn" data-intent="dudas">
            <span class="welcome-btn-icon">💬</span>
            <span class="welcome-btn-content">
              <span class="welcome-btn-title">Tengo dudas</span>
              <span class="welcome-btn-desc">Pregúntame lo que quieras</span>
            </span>
            <span class="welcome-btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ============ PANTALLA 2: CHATBOT ============ -->
    <main class="chat-wrapper" id="chat-wrapper" hidden>
      <div class="chat" id="chat">

        <!-- Cabecera del chat -->
        <div class="chat-header">
          <button class="back-btn" id="back-btn" aria-label="Volver">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="chat-header-info">
            <h2>Asistente Virtual</h2>
          </div>
        </div>

        <!-- Mensajes -->
        <div class="messages" id="messages"></div>

        <!-- Accesos rápidos -->
        <div class="shortcuts" id="shortcuts">
          <button class="shortcut" data-key="colaboracion">¿Qué es la promoción?</button>
          <button class="shortcut" data-key="socio">Hacerme socio</button>
          <button class="shortcut" data-key="vincular">Vincular contrato</button>
        </div>

        <!-- Caja de entrada -->
        <form class="input-bar" id="input-bar" autocomplete="off">
          <input
            type="text"
            id="user-input"
            placeholder="Escribe tu pregunta…"
            aria-label="Escribe tu pregunta"
          />
          <button type="submit" id="send-btn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
