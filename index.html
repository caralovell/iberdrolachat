<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Asistente Virtual · Iberdrola × Carrefour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <!-- Cabecera de marca -->
    <header class="brand-bar">
      <div class="brand-left">
        <img src="iberdrolaa.png" alt="Iberdrola × Carrefour" class="logo-combo" />
      </div>
    </header>

    <!-- Contenedor del chatbot -->
    <main class="chat-wrapper">
      <div class="chat" id="chat">

        <!-- Cabecera del chat -->
        <div class="chat-header">
          <div class="chat-header-info">
            <h2>Asistente Virtual</h2>
          </div>
        </div>

        <!-- Mensajes -->
        <div class="messages" id="messages">
          <!-- Aquí se inyectan los mensajes -->
        </div>

        <!-- Accesos rápidos -->
        <div class="shortcuts" id="shortcuts">
          <button class="shortcut" data-key="colaboracion">¿Qué es la promoción?</button>
          <button class="shortcut" data-key="socio">Hacerme socio</button>
          <button class="shortcut" data-key="vincular">Vincular contrato</button>
        </div>

        <!-- Caja de entrada -->
        <form class="input-bar" id="input-bar" autocomplete="off">
          <input
            type="text"
            id="user-input"
            placeholder="Escribe tu pregunta…"
            aria-label="Escribe tu pregunta"
          />
          <button type="submit" id="send-btn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
