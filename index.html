<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Asistente Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <!-- Cabecera de marca -->
    <header class="brand-bar">
      <div class="brand-left">
        <img src="iberdrolaa.png" alt="Iberdrola × Carrefour" class="logo-combo" />
      </div>
    </header>

    <!-- ============ PANTALLA 1: BIENVENIDA ============ -->
    <section class="welcome-screen" id="welcome-screen">
      <div class="welcome-content">

        <!-- Avatar (imagen personalizada) -->
        <div class="avatar-hero">
          <img src="personita.png" alt="Asistente Virtual" class="avatar-img" />
          <div class="status-pulse"></div>
        </div>

        <h1 class="welcome-title">Soy tu asistente virtual</h1>
        <p class="welcome-subtitle">¿En qué te puedo ayudar hoy?</p>

        <div class="welcome-buttons">
          <button class="welcome-btn" data-intent="que_es">
            <span class="welcome-btn-icon">💚</span>
            <span class="welcome-btn-content">
              <span class="welcome-btn-title">¿Qué es?</span>
              <span class="welcome-btn-desc">Conoce la alianza Iberdrola × Carrefour</span>
            </span>
            <span class="welcome-btn-arrow">→</span>
          </button>

          <button class="welcome-btn" data-intent="contratar">
            <span class="welcome-btn-icon">⚡</span>
            <span class="welcome-btn-content">
              <span class="welcome-btn-title">Quiero contratar</span>
              <span class="welcome-btn-desc">Empieza a ahorrar con tu energía</span>
            </span>
            <span class="welcome-btn-arrow">→</span>
          </button>

          <button class="welcome-btn" data-intent="dudas">
            <span class="welcome-btn-icon">💬</span>
            <span class="welcome-btn-content">
              <span class="welcome-btn-title">Tengo dudas</span>
              <span class="welcome-btn-desc">Pregúntame lo que quieras</span>
            </span>
            <span class="welcome-btn-arrow">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ============ PANTALLA 2: CHATBOT ============ -->
    <main class="chat-wrapper" id="chat-wrapper" hidden>
      <div class="chat" id="chat">

        <!-- Cabecera del chat -->
        <div class="chat-header">
          <button class="back-btn" id="back-btn" aria-label="Volver">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="chat-header-info">
            <h2>Asistente Virtual</h2>
          </div>
        </div>

        <!-- Mensajes -->
        <div class="messages" id="messages"></div>

        <!-- Accesos rápidos -->
        <div class="shortcuts" id="shortcuts">
          <button class="shortcut" data-key="colaboracion">¿Qué es la promoción?</button>
          <button class="shortcut" data-key="socio">Hacerme socio</button>
          <button class="shortcut" data-key="vincular">Vincular contrato</button>
        </div>

        <!-- Caja de entrada -->
        <form class="input-bar" id="input-bar" autocomplete="off">
          <input
            type="text"
            id="user-input"
            placeholder="Escribe tu pregunta…"
            aria-label="Escribe tu pregunta"
          />
          <button type="submit" id="send-btn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
